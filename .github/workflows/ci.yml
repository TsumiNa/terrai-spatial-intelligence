name: CI

# The Python job runs on every change, including documentation-only ones:
# `terrai validate` is the check that verifies Markdown itself — refactor
# status lines, trilingual link groups, and the literal contract strings in
# the architecture documents. The browser-based jobs live in app-ci.yml and
# skip Markdown-only changes.

on:
  push:
    branches: [main]
  pull_request:

# A superseded run tells you nothing useful.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  python:
    name: Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install
        run: uv sync --locked

      - name: Lint
        run: uv run ruff check terrai_spatial/ scripts/

      # The MLIT foundation data is a gitignored Kanto-scope acquisition
      # (~2.3 GB of GeoJSON, ~2.7M features): restored from the Actions cache
      # keyed on the acquisition table, fetched from MLIT only when that
      # table changes.
      - name: Restore foundation data
        id: mlit-cache
        uses: actions/cache@v4
        with:
          path: data/mlit
          key: mlit-${{ hashFiles('scripts/fetch_mlit_foundation.py', 'terrai_spatial/pipeline/regions.py') }}

      - name: Fetch foundation data on cache miss
        if: steps.mlit-cache.outputs.cache-hit != 'true'
        run: uv run python -m terrai_spatial fetch mlit

      # The service tests exercise the store-backed DataService, and the
      # store is a derived artifact rebuilt from the provisioned data files —
      # exactly what this does, with no further network access.
      - name: Build derived data
        run: uv run python -m terrai_spatial data ensure --only store --offline

      - name: Test
        run: uv run pytest -q

      # Data-task freshness is derived from file modification times, and a fresh
      # clone stamps every file with the checkout time. Only repository content
      # is a property of the commit, so only that is checked here.
      - name: Validate repository contracts
        run: uv run python -m terrai_spatial validate --skip-data-tasks
