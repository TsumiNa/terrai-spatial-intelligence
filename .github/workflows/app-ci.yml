name: App CI

# The expensive jobs: a Node toolchain, a Vite build, and a Playwright
# browser. Markdown never reaches the frontend build, so documentation-only
# changes skip this workflow entirely; the Python workflow in ci.yml still
# validates the documents themselves.

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
  pull_request:
    paths-ignore:
      - "**.md"

# A superseded run tells you nothing useful, and these jobs install a browser.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  webapp:
    name: Web app
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: webapp
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: webapp/package-lock.json

      - name: Install
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Unit test
        run: npm run test

      # `npm run build` also runs svelte-check, which the previous step did.
      - name: Build
        run: npx vite build

  e2e:
    name: End to end
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: webapp/package-lock.json

      - name: Install Python environment
        run: uv sync --locked

      - name: Install web dependencies
        run: npm ci
        working-directory: webapp

      # Cached separately from node_modules: the browser is large and changes
      # only when the Playwright version does.
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('webapp/package-lock.json') }}

      - name: Install Playwright browser
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium
        working-directory: webapp

      # The browser is cached but its OS packages are not part of that cache.
      - name: Install Playwright system dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium
        working-directory: webapp

      # playwright.config.ts starts both the built web app and the FastAPI
      # service itself, so nothing needs to be launched here.
      # The MLIT foundation data is a gitignored Kanto-scope acquisition
      # (~2.3 GB of GeoJSON, ~2.7M features): restored from the Actions cache
      # keyed on the acquisition table, fetched from MLIT only when that
      # table changes.
      - name: Restore foundation data
        id: mlit-cache
        uses: actions/cache@v4
        with:
          path: data/mlit
          key: mlit-${{ hashFiles('scripts/fetch_mlit_foundation.py', 'terrai_spatial/pipeline/regions.py', 'terrai_spatial/pipeline/io.py', 'terrai_spatial/pipeline/http.py', 'terrai_spatial/pipeline/provenance.py') }}

      - name: Fetch foundation data on cache miss
        if: steps.mlit-cache.outputs.cache-hit != 'true'
        run: uv run python -m terrai_spatial fetch mlit

      # The API refuses to start without the derived store; build it from
      # the provisioned files before the suite launches the server.
      - name: Build derived data
        run: uv run python -m terrai_spatial data ensure --only store --offline

      - name: End-to-end test
        run: npm run test:e2e
        working-directory: webapp

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: webapp/playwright-report/
          retention-days: 7
